name: Maven Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_USERNAME: Joajak92
      GITHUB_TOKEN: ${{ secrets.TOKEN }}

    steps:
      - name: Checka ut koden
        uses: actions/checkout@v4

      - name: Installera Java och konfigurera Maven auth
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          server-id: github
          server-username: GITHUB_USERNAME
          server-password: GITHUB_TOKEN
          cache: maven

      - name: Bygg projektet
        run: mvn -B -U clean package --file pom.xml
